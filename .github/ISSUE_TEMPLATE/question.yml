name: Question or setup help
description: Ask for help after checking the docs and existing issues
title: "[Question]: "
body:
  - type: markdown
    attributes:
      value: |
        Support is volunteer-run. Please read SUPPORT.md, check the docs, and remove all credentials and personal information.
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Include relevant documentation, commands, and sanitized output.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows 11, Codex, Node 22, existing FtcRobotController project"
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I removed passwords, tokens, student information, and private team data.
          required: true
